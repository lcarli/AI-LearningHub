<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="480" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">RAG Pipeline — Ingestion + Retrieval</text>

  <!-- ========= INGESTION PHASE (top) ========= -->
  <text x="30" y="75" font-size="13" font-weight="bold" fill="#6c757d">INGESTION (runs once)</text>

  <!-- Documents box -->
  <rect x="30" y="88" width="130" height="60" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="95" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a6eb5">📄 Documents</text>
  <text x="95" y="130" text-anchor="middle" font-size="11" fill="#444">FAQs, manuals,</text>
  <text x="95" y="143" text-anchor="middle" font-size="11" fill="#444">product pages</text>

  <!-- Arrow -->
  <line x1="160" y1="118" x2="210" y2="118" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Chunking box -->
  <rect x="210" y="88" width="130" height="60" rx="8" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="275" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#856404">✂️ Chunking</text>
  <text x="275" y="130" text-anchor="middle" font-size="11" fill="#444">~512 tokens</text>
  <text x="275" y="143" text-anchor="middle" font-size="11" fill="#444">50-token overlap</text>

  <!-- Arrow -->
  <line x1="340" y1="118" x2="390" y2="118" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Embedding box -->
  <rect x="390" y="88" width="140" height="60" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="460" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#155724">🔢 Embedding</text>
  <text x="460" y="130" text-anchor="middle" font-size="11" fill="#444">text-embedding-3-small</text>
  <text x="460" y="143" text-anchor="middle" font-size="11" fill="#444">→ float[1536]</text>

  <!-- Arrow -->
  <line x1="530" y1="118" x2="580" y2="118" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vector DB box -->
  <rect x="580" y="88" width="130" height="60" rx="8" fill="#f3d9fa" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="645" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#6c3483">🗄️ Vector DB</text>
  <text x="645" y="130" text-anchor="middle" font-size="11" fill="#444">pgvector / Chroma</text>
  <text x="645" y="143" text-anchor="middle" font-size="11" fill="#444">/ Qdrant</text>

  <!-- Divider -->
  <line x1="30" y1="185" x2="870" y2="185" stroke="#dee2e6" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ========= RETRIEVAL PHASE (bottom) ========= -->
  <text x="30" y="210" font-size="13" font-weight="bold" fill="#6c757d">RETRIEVAL + GENERATION (every query)</text>

  <!-- User query -->
  <rect x="30" y="225" width="130" height="55" rx="8" fill="#cfe2ff" stroke="#0d6efd" stroke-width="1.5"/>
  <text x="95" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#0a3d8a">👤 User Query</text>
  <text x="95" y="265" text-anchor="middle" font-size="11" fill="#444">"Best tent for</text>
  <text x="95" y="278" text-anchor="middle" font-size="11" fill="#444">solo hiking?"</text>

  <!-- Arrow -->
  <line x1="160" y1="252" x2="210" y2="252" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Embed query -->
  <rect x="210" y="225" width="130" height="55" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="275" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#155724">🔢 Embed</text>
  <text x="275" y="265" text-anchor="middle" font-size="11" fill="#444">query → vector</text>
  <text x="275" y="278" text-anchor="middle" font-size="11" fill="#444">(same model)</text>

  <!-- Arrow -->
  <line x1="340" y1="252" x2="390" y2="252" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vector search -->
  <rect x="390" y="225" width="130" height="55" rx="8" fill="#f3d9fa" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="455" y="245" text-anchor="middle" font-size="13" font-weight="bold" fill="#6c3483">🔍 Search</text>
  <text x="455" y="262" text-anchor="middle" font-size="11" fill="#444">cosine similarity</text>
  <text x="455" y="275" text-anchor="middle" font-size="11" fill="#444">top-k chunks</text>

  <!-- Arrow -->
  <line x1="520" y1="252" x2="570" y2="252" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Augment prompt -->
  <rect x="570" y="225" width="130" height="55" rx="8" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="635" y="245" text-anchor="middle" font-size="13" font-weight="bold" fill="#856404">📝 Augment</text>
  <text x="635" y="262" text-anchor="middle" font-size="11" fill="#444">chunks + query</text>
  <text x="635" y="275" text-anchor="middle" font-size="11" fill="#444">→ prompt</text>

  <!-- Arrow -->
  <line x1="700" y1="252" x2="750" y2="252" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="750" y="225" width="110" height="55" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="805" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a6eb5">🤖 LLM</text>
  <text x="805" y="265" text-anchor="middle" font-size="11" fill="#444">generates</text>
  <text x="805" y="278" text-anchor="middle" font-size="11" fill="#444">answer</text>

  <!-- Response arrow (back down) -->
  <line x1="805" y1="280" x2="805" y2="340" stroke="#28a745" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>

  <!-- Answer box -->
  <rect x="680" y="340" width="245" height="60" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="802" y="364" text-anchor="middle" font-size="13" font-weight="bold" fill="#155724">✅ Grounded Answer</text>
  <text x="802" y="382" text-anchor="middle" font-size="11" fill="#444">"The TrailBlazer Solo (P003) at 850g</text>
  <text x="802" y="395" text-anchor="middle" font-size="11" fill="#444">is ideal for solo backpacking…"</text>

  <!-- Key insight box -->
  <rect x="30" y="340" width="610" height="85" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="50" y="362" font-size="12" font-weight="bold" fill="#495057">💡 Key insight: The same embedding model is used for both ingestion and queries.</text>
  <text x="50" y="382" font-size="11" fill="#666">If you embed documents with text-embedding-3-small, you MUST also embed queries with</text>
  <text x="50" y="397" font-size="11" fill="#666">text-embedding-3-small. Mixing models produces meaningless similarity scores.</text>
  <text x="50" y="415" font-size="11" fill="#666">The retrieved chunks become the "context" the LLM uses to generate a factual answer.</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#28a745"/>
    </marker>
  </defs>
</svg>
