<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="700" height="350" fill="#f8f9fa" rx="12"/>

  <!-- Trade-off 1: Control vs Simplicity -->
  <text x="350" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">The Two Key Trade-offs</text>

  <text x="350" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">1. Control vs. Simplicity</text>

  <!-- Gradient bar -->
  <defs>
    <linearGradient id="controlGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.15"/>
    </linearGradient>
  </defs>
  <rect x="50" y="75" width="600" height="50" rx="8" fill="url(#controlGrad)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Labels -->
  <text x="70" y="95" font-size="10" font-weight="600" fill="#dc2626">← More Control</text>
  <text x="630" y="95" text-anchor="end" font-size="10" font-weight="600" fill="#16a34a">More Simplicity →</text>

  <!-- Tool positions -->
  <rect x="65" y="100" width="100" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1" filter="url(#shadow)"/>
  <text x="115" y="115" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">AutoGen</text>

  <rect x="200" y="100" width="120" height="22" rx="4" fill="#fef9c3" stroke="#eab308" stroke-width="1" filter="url(#shadow)"/>
  <text x="260" y="115" text-anchor="middle" font-size="9" font-weight="600" fill="#a16207">Agent Framework</text>

  <rect x="360" y="100" width="100" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="410" y="115" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Foundry</text>

  <rect x="505" y="100" width="120" height="22" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1" filter="url(#shadow)"/>
  <text x="565" y="115" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">Copilot Studio</text>

  <text x="350" y="148" text-anchor="middle" font-size="10" fill="#64748b">More control = more flexibility + more responsibility</text>

  <!-- Trade-off 2: Free vs Paid -->
  <text x="350" y="185" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">2. Free vs. Paid</text>

  <!-- Three columns -->
  <rect x="40" y="200" width="200" height="105" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">✅ Always Free</text>
  <text x="140" y="244" text-anchor="middle" font-size="10" fill="#374151">L50 conceptual labs</text>
  <text x="140" y="262" text-anchor="middle" font-size="10" fill="#374151">Ollama / Foundry Local</text>
  <text x="140" y="280" text-anchor="middle" font-size="10" fill="#374151">Local MCP servers</text>
  <text x="140" y="298" text-anchor="middle" font-size="10" fill="#374151">No account needed</text>

  <rect x="255" y="200" width="200" height="105" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="355" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">✅ GitHub Free</text>
  <text x="355" y="244" text-anchor="middle" font-size="10" fill="#374151">GitHub Models (free LLMs)</text>
  <text x="355" y="262" text-anchor="middle" font-size="10" fill="#374151">Agent Framework + SK</text>
  <text x="355" y="280" text-anchor="middle" font-size="10" fill="#374151">VS Code extensions</text>
  <text x="355" y="298" text-anchor="middle" font-size="10" fill="#374151">L100–L200 labs</text>

  <rect x="470" y="200" width="200" height="105" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="570" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#a16207">⚠️ Azure Subscription</text>
  <text x="570" y="244" text-anchor="middle" font-size="10" fill="#374151">Foundry Agent Service</text>
  <text x="570" y="262" text-anchor="middle" font-size="10" fill="#374151">Azure PostgreSQL</text>
  <text x="570" y="280" text-anchor="middle" font-size="10" fill="#374151">Application Insights</text>
  <text x="570" y="298" text-anchor="middle" font-size="10" fill="#374151">L300+ advanced labs</text>

  <text x="350" y="335" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">Start free → add Azure only when you need production features</text>
</svg>
