<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="700" height="520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="520" fill="#f8fafc" rx="14"/>

  <!-- Title -->
  <text x="350" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">The AI Agent Loop</text>
  <text x="350" y="55" text-anchor="middle" font-size="12" fill="#64748b">Agents autonomously loop until the goal is achieved</text>

  <!-- ── USER GOAL (top) ── -->
  <rect x="255" y="72" width="190" height="52" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">🎯 User Goal</text>
  <text x="350" y="113" text-anchor="middle" font-size="11" fill="#1e3a8a">"Find a tent under $300"</text>

  <!-- Arrow: User Goal → Perceive -->
  <line x1="350" y1="124" x2="350" y2="158" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ── CENTER LOOP CONTAINER ── -->
  <rect x="60" y="162" width="580" height="270" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="350" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#94a3b8">AGENT LOOP (repeats until done)</text>

  <!-- ── 1. PERCEIVE (top-left) ── -->
  <rect x="90" y="196" width="148" height="68" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  <text x="164" y="218" text-anchor="middle" font-size="22">🔍</text>
  <text x="164" y="238" text-anchor="middle" font-size="13" font-weight="bold" fill="#075985">Perceive</text>
  <text x="164" y="254" text-anchor="middle" font-size="10" fill="#374151">Receive input, files,</text>
  <text x="164" y="267" text-anchor="middle" font-size="10" fill="#374151">API responses, events</text>

  <!-- Arrow: Perceive → Reason -->
  <line x1="238" y1="230" x2="310" y2="230" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- ── 2. REASON (top-right) ── -->
  <rect x="312" y="196" width="148" height="68" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2" filter="url(#shadow)"/>
  <text x="386" y="218" text-anchor="middle" font-size="22">🧠</text>
  <text x="386" y="238" text-anchor="middle" font-size="13" font-weight="bold" fill="#713f12">Reason</text>
  <text x="386" y="254" text-anchor="middle" font-size="10" fill="#374151">LLM decides what</text>
  <text x="386" y="267" text-anchor="middle" font-size="10" fill="#374151">to do next</text>

  <!-- Arrow: Reason → Act -->
  <line x1="460" y1="230" x2="532" y2="230" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- ── 3. ACT (bottom-right) ── -->
  <rect x="462" y="196" width="148" height="68" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="536" y="218" text-anchor="middle" font-size="22">⚡</text>
  <text x="536" y="238" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">Act</text>
  <text x="536" y="254" text-anchor="middle" font-size="10" fill="#374151">Call API, query DB,</text>
  <text x="536" y="267" text-anchor="middle" font-size="10" fill="#374151">write file, send email</text>

  <!-- Arrow: Act → down to Observe -->
  <line x1="536" y1="264" x2="536" y2="326" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- ── 4. OBSERVE (bottom-right) ── -->
  <rect x="462" y="328" width="148" height="68" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="536" y="350" text-anchor="middle" font-size="22">👁️</text>
  <text x="536" y="370" text-anchor="middle" font-size="13" font-weight="bold" fill="#4c1d95">Observe</text>
  <text x="536" y="386" text-anchor="middle" font-size="10" fill="#374151">Read tool result,</text>
  <text x="536" y="399" text-anchor="middle" font-size="10" fill="#374151">update context</text>

  <!-- Arrow: Observe → back left to Perceive (bottom arc) -->
  <!-- Horizontal line from Observe left -->
  <line x1="462" y1="362" x2="164" y2="362" stroke="#64748b" stroke-width="1.8" stroke-dasharray="6,3"/>
  <!-- Vertical line back up to Perceive -->
  <line x1="164" y1="362" x2="164" y2="264" stroke="#64748b" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>

  <!-- Loop label on the return arc -->
  <text x="314" y="380" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">← loop back if not done yet</text>

  <!-- ── GOAL ACHIEVED (bottom) ── -->
  <!-- Arrow down from loop -->
  <line x1="350" y1="432" x2="350" y2="460" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Decision diamond: done? -->
  <polygon points="350,406 400,432 350,458 300,432" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="350" y="429" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Done?</text>

  <!-- "No" label back up -->
  <text x="411" y="422" font-size="10" fill="#dc2626" font-weight="bold">Yes</text>

  <rect x="255" y="462" width="190" height="46" rx="10" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="482" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">✅ Goal Achieved</text>
  <text x="350" y="499" text-anchor="middle" font-size="10" fill="#166534">Final answer delivered to user</text>
</svg>
