<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 410" width="900" height="410" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="410" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">MCP Architecture — Model Context Protocol</text>

  <!-- ===== MCP HOST (left) ===== -->
  <rect x="20" y="60" width="210" height="280" rx="10" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="125" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a6eb5">🖥️ MCP Host</text>
  <text x="125" y="100" text-anchor="middle" font-size="10" fill="#666">(Claude, Copilot, VS Code…)</text>

  <!-- Client 1 -->
  <rect x="35" y="110" width="180" height="50" rx="6" fill="#fff" stroke="#4a90d9" stroke-width="1"/>
  <text x="125" y="131" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a6eb5">MCP Client 1</text>
  <text x="125" y="148" text-anchor="middle" font-size="10" fill="#555">maintains 1:1 connection</text>

  <!-- Client 2 -->
  <rect x="35" y="170" width="180" height="50" rx="6" fill="#fff" stroke="#4a90d9" stroke-width="1"/>
  <text x="125" y="191" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a6eb5">MCP Client 2</text>
  <text x="125" y="208" text-anchor="middle" font-size="10" fill="#555">maintains 1:1 connection</text>

  <!-- Client 3 -->
  <rect x="35" y="230" width="180" height="50" rx="6" fill="#fff" stroke="#4a90d9" stroke-width="1"/>
  <text x="125" y="251" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a6eb5">MCP Client 3</text>
  <text x="125" y="268" text-anchor="middle" font-size="10" fill="#555">maintains 1:1 connection</text>

  <!-- LLM inside host -->
  <rect x="35" y="295" width="180" height="35" rx="6" fill="#cfe2ff" stroke="#0d6efd" stroke-width="1"/>
  <text x="125" y="317" text-anchor="middle" font-size="12" font-weight="bold" fill="#0a3d8a">🤖 LLM (GPT-4o, etc.)</text>

  <!-- ===== ARROWS (host → servers) ===== -->
  <!-- Client 1 → Server 1 -->
  <line x1="215" y1="135" x2="370" y2="135" stroke="#888" stroke-width="1.5" marker-end="url(#arrowBi)"/>
  <line x1="370" y1="135" x2="215" y2="135" stroke="#888" stroke-width="1.5"/>
  <text x="292" y="128" text-anchor="middle" font-size="9" fill="#888">JSON-RPC 2.0</text>
  <text x="292" y="148" text-anchor="middle" font-size="9" fill="#888">stdio / SSE / HTTP</text>

  <!-- Client 2 → Server 2 -->
  <line x1="215" y1="195" x2="370" y2="195" stroke="#888" stroke-width="1.5"/>
  <line x1="370" y1="195" x2="215" y2="195" stroke="#888" stroke-width="1.5" marker-end="url(#arrowBiLeft)"/>

  <!-- Client 3 → Server 3 -->
  <line x1="215" y1="255" x2="370" y2="255" stroke="#888" stroke-width="1.5"/>
  <line x1="370" y1="255" x2="215" y2="255" stroke="#888" stroke-width="1.5" marker-end="url(#arrowBiLeft)"/>

  <!-- ===== MCP SERVERS (right) ===== -->

  <!-- Server 1: Products -->
  <rect x="370" y="95" width="220" height="95" rx="10" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="480" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#155724">🔧 MCP Server 1</text>
  <text x="480" y="134" text-anchor="middle" font-size="11" fill="#155724">Product Catalog</text>
  <rect x="385" y="142" width="90" height="22" rx="4" fill="#fff" stroke="#28a745" stroke-width="1"/>
  <text x="430" y="157" text-anchor="middle" font-size="10" fill="#155724">🔍 search_products</text>
  <rect x="485" y="142" width="95" height="22" rx="4" fill="#fff" stroke="#28a745" stroke-width="1"/>
  <text x="532" y="157" text-anchor="middle" font-size="10" fill="#155724">📋 get_details</text>
  <text x="480" y="180" text-anchor="middle" font-size="10" fill="#666">Tools + Resources + Prompts</text>

  <!-- Server 2: Orders -->
  <rect x="370" y="205" width="220" height="80" rx="10" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="480" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#856404">🔧 MCP Server 2</text>
  <text x="480" y="244" text-anchor="middle" font-size="11" fill="#856404">Order Management</text>
  <rect x="385" y="252" width="90" height="22" rx="4" fill="#fff" stroke="#f0ad4e" stroke-width="1"/>
  <text x="430" y="267" text-anchor="middle" font-size="10" fill="#856404">📦 get_order</text>
  <rect x="485" y="252" width="95" height="22" rx="4" fill="#fff" stroke="#f0ad4e" stroke-width="1"/>
  <text x="532" y="267" text-anchor="middle" font-size="10" fill="#856404">↩️ init_return</text>

  <!-- Server 3: External APIs -->
  <rect x="370" y="300" width="220" height="65" rx="10" fill="#f3d9fa" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="480" y="323" text-anchor="middle" font-size="13" font-weight="bold" fill="#6c3483">🔧 MCP Server 3</text>
  <text x="480" y="339" text-anchor="middle" font-size="11" fill="#6c3483">External APIs</text>
  <text x="480" y="356" text-anchor="middle" font-size="10" fill="#666">Weather, Maps, Email…</text>

  <!-- ===== REAL DATA (far right) ===== -->
  <rect x="620" y="95" width="260" height="270" rx="10" fill="#fff" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="750" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#495057">💾 Real Data Sources</text>

  <!-- DB -->
  <rect x="635" y="128" width="230" height="38" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1"/>
  <text x="750" y="152" text-anchor="middle" font-size="11" fill="#1a6eb5">🐘 PostgreSQL + pgvector</text>

  <!-- File system -->
  <rect x="635" y="175" width="230" height="38" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1"/>
  <text x="750" y="199" text-anchor="middle" font-size="11" fill="#155724">📁 Files / SharePoint / OneDrive</text>

  <!-- REST API -->
  <rect x="635" y="222" width="230" height="38" rx="6" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1"/>
  <text x="750" y="246" text-anchor="middle" font-size="11" fill="#856404">🌐 REST APIs / Webhooks</text>

  <!-- GitHub -->
  <rect x="635" y="269" width="230" height="38" rx="6" fill="#f3d9fa" stroke="#9b59b6" stroke-width="1"/>
  <text x="750" y="293" text-anchor="middle" font-size="11" fill="#6c3483">🐙 GitHub / Azure DevOps</text>

  <!-- Arrows from servers to data -->
  <line x1="590" y1="135" x2="630" y2="145" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="590" y1="245" x2="630" y2="240" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="590" y1="328" x2="630" y2="290" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- KEY POINT -->
  <rect x="20" y="353" width="860" height="30" rx="4" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="450" y="372" text-anchor="middle" font-size="11" fill="#495057">💡 Each MCP client maintains a 1:1 connection to one server. The host coordinates multiple clients/servers.</text>

  <defs>
    <marker id="arrowBi"     markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">  <path d="M0,0 L0,6 L8,3 z" fill="#888"/></marker>
    <marker id="arrowBiLeft" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">  <path d="M8,0 L8,6 L0,3 z" fill="#888"/></marker>
  </defs>
</svg>
