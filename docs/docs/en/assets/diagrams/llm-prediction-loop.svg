<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="700" height="380" fill="#f8f9fa" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">The LLM Prediction Loop</text>

  <!-- Step 1: Input text -->
  <rect x="220" y="45" width="260" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">💬 Input: "The capital of France is"</text>
  <text x="350" y="78" text-anchor="middle" font-size="9" fill="#3b82f6">Natural language text</text>

  <line x1="350" y1="85" x2="350" y2="108" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Tokenize -->
  <rect x="170" y="113" width="360" height="38" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">🔤 Tokenize → [464, 3361, 286, 4881, 318]</text>
  <text x="350" y="145" text-anchor="middle" font-size="9" fill="#22c55e">Text split into token IDs (~4 chars each)</text>

  <line x1="350" y1="151" x2="350" y2="174" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Transformer -->
  <rect x="150" y="179" width="400" height="45" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">🧠 Transformer Neural Network</text>
  <text x="350" y="217" text-anchor="middle" font-size="10" fill="#8b5cf6">96 layers × billions of parameters × self-attention</text>

  <line x1="350" y1="224" x2="350" y2="247" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Probability distribution -->
  <rect x="130" y="252" width="440" height="55" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="272" text-anchor="middle" font-size="11" font-weight="600" fill="#a16207">📊 Probability Distribution</text>

  <!-- Probability bars -->
  <rect x="170" y="280" width="200" height="12" rx="3" fill="#16a34a" opacity="0.8"/>
  <text x="165" y="290" text-anchor="end" font-size="9" fill="#374151">"Paris"</text>
  <text x="375" y="290" font-size="9" fill="#16a34a" font-weight="600">94.7%</text>

  <rect x="170" y="294" width="20" height="8" rx="2" fill="#eab308" opacity="0.6"/>
  <text x="165" y="301" text-anchor="end" font-size="8" fill="#64748b">"Lyon"</text>
  <text x="195" y="301" font-size="8" fill="#ca8a04">2.1%</text>

  <line x1="350" y1="307" x2="350" y2="325" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Output -->
  <rect x="245" y="330" width="210" height="30" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">✅ Output: "Paris"</text>
</svg>
