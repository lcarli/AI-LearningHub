<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    <marker id="arrowA" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="750" height="420" fill="#f8f9fa" rx="12"/>
  <text x="375" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Cosine Similarity — Angle Between Vectors</text>

  <!-- Left panel: Vector diagram -->
  <rect x="20" y="50" width="380" height="300" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Origin -->
  <circle cx="80" cy="310" r="5" fill="#475569"/>
  <text x="70" y="330" font-size="9" fill="#64748b">Origin</text>

  <!-- Vector A: "waterproof hiking boots" — 25° angle -->
  <line x1="80" y1="310" x2="340" y2="120" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowA)"/>
  <rect x="300" y="90" width="90" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="345" y="107" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Vector A</text>
  <text x="345" y="122" text-anchor="middle" font-size="8" fill="#3b82f6">"waterproof</text>
  <!-- label continues outside box for readability -->

  <!-- Vector B: "weatherproof trekking shoes" — 30° (close to A) -->
  <line x1="80" y1="310" x2="360" y2="145" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowB)"/>
  <rect x="315" y="138" width="80" height="40" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1" filter="url(#shadow)"/>
  <text x="355" y="155" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">Vector B</text>
  <text x="355" y="170" text-anchor="middle" font-size="8" fill="#22c55e">"weatherproof</text>

  <!-- Small angle arc between A and B -->
  <path d="M 180 230 A 80 80 0 0 1 190 218" stroke="#16a34a" stroke-width="2" fill="none"/>
  <text x="200" y="215" font-size="10" font-weight="700" fill="#16a34a">15°</text>
  <text x="195" y="230" font-size="8" fill="#16a34a">small angle</text>

  <!-- Vector C: "chocolate birthday cake" — 80° (far from A) -->
  <line x1="80" y1="310" x2="370" y2="290" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowC)"/>
  <rect x="325" y="270" width="70" height="40" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1" filter="url(#shadow)"/>
  <text x="360" y="287" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">Vector C</text>
  <text x="360" y="302" text-anchor="middle" font-size="8" fill="#ef4444">"chocolate</text>

  <!-- Large angle arc between A and C -->
  <path d="M 170 250 A 100 100 0 0 1 180 282" stroke="#dc2626" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="155" y="275" font-size="10" font-weight="700" fill="#dc2626">75°</text>
  <text x="152" y="290" font-size="8" fill="#dc2626">large angle</text>

  <!-- Right panel: Scale + examples -->
  <rect x="420" y="50" width="310" height="300" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="575" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">Cosine Similarity Scale</text>

  <!-- Scale bar -->
  <defs>
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#eab308;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <rect x="440" y="90" width="30" height="230" rx="4" fill="url(#scaleGrad)"/>

  <!-- Scale labels -->
  <text x="478" y="100" font-size="11" font-weight="700" fill="#16a34a">1.0</text>
  <text x="505" y="100" font-size="9" fill="#16a34a">Identical meaning</text>

  <rect x="478" y="113" width="230" height="28" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="488" y="127" font-size="9" fill="#16a34a">0.90–0.95</text>
  <text x="555" y="127" font-size="9" fill="#374151">A ↔ B: hiking boots ≈ trekking shoes</text>
  <text x="488" y="138" font-size="8" fill="#64748b">Same concept, different words</text>

  <rect x="478" y="150" width="230" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="488" y="164" font-size="9" fill="#1e40af">0.70–0.89</text>
  <text x="555" y="164" font-size="9" fill="#374151">Same category (tent ↔ backpack)</text>
  <text x="488" y="175" font-size="8" fill="#64748b">Related but different products</text>

  <text x="478" y="210" font-size="11" font-weight="700" fill="#ca8a04">0.0</text>
  <text x="505" y="210" font-size="9" fill="#ca8a04">Unrelated</text>

  <rect x="478" y="222" width="230" height="28" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="488" y="236" font-size="9" fill="#a16207">0.30–0.50</text>
  <text x="555" y="236" font-size="9" fill="#374151">Weak connection</text>
  <text x="488" y="247" font-size="8" fill="#64748b">tent ↔ chocolate cake</text>

  <rect x="478" y="262" width="230" height="28" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="488" y="276" font-size="9" fill="#dc2626">0.00–0.20</text>
  <text x="555" y="276" font-size="9" fill="#374151">A ↔ C: boots ≈ cake = no relation</text>
  <text x="488" y="287" font-size="8" fill="#64748b">Perpendicular vectors</text>

  <text x="478" y="320" font-size="11" font-weight="700" fill="#dc2626">-1.0</text>
  <text x="510" y="320" font-size="9" fill="#dc2626">Opposite meaning</text>

  <!-- Footer -->
  <rect x="20" y="365" width="710" height="35" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="375" y="387" text-anchor="middle" font-size="10" fill="#475569">💡 RAG systems typically retrieve chunks with cosine similarity &gt; 0.7 · Most similar docs score 0.85–0.95</text>
</svg>
