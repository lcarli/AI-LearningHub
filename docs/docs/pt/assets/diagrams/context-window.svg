<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="700" height="230" fill="#f8f9fa" rx="12"/>
  <text x="350" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Context Window — The Model's Working Memory</text>
  <text x="350" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">How much text the model can "see" at once (1 token ≈ ¾ word)</text>

  <!-- Scale bar background -->
  <rect x="30" y="60" width="640" height="8" rx="4" fill="#e2e8f0"/>

  <!-- Phi-4: 16K -->
  <rect x="30" y="75" width="51" height="28" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="56" y="93" text-anchor="middle" font-size="9" font-weight="600" fill="#a16207">Phi-4</text>
  <text x="56" y="118" text-anchor="middle" font-size="9" fill="#ca8a04">16K</text>
  <rect x="30" y="60" width="51" height="8" rx="4" fill="#eab308"/>

  <!-- GPT-4o: 128K -->
  <rect x="30" y="130" width="410" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="235" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">GPT-4o / GPT-4o-mini / Llama 3.3 — 128K tokens (~96K words)</text>
  <rect x="30" y="60" width="410" height="8" rx="4" fill="#3b82f6" opacity="0.5"/>

  <!-- Claude 3.5: 200K -->
  <rect x="30" y="165" width="640" height="28" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="183" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Claude 3.5 Sonnet — 200K tokens (~150K words ≈ 2-3 novels)</text>
  <rect x="30" y="60" width="640" height="8" rx="4" fill="#8b5cf6" opacity="0.3"/>

  <!-- Note -->
  <text x="350" y="212" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">⚠️ Longer context = slower + more expensive. Agents use RAG to stay within limits.</text>
</svg>
