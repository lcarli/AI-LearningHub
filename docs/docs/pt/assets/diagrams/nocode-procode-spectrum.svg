<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/></filter>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <rect width="700" height="200" fill="#f8f9fa" rx="12"/>
  <text x="350" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">No-Code → Pro-Code</text>

  <!-- Gradient bar -->
  <rect x="30" y="40" width="640" height="10" rx="5" fill="url(#spectrumGrad)"/>
  <rect x="30" y="40" width="640" height="10" rx="5" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Labels -->
  <text x="40" y="38" font-size="10" font-weight="600" fill="#16a34a">← No-Code</text>
  <text x="660" y="38" text-anchor="end" font-size="10" font-weight="600" fill="#6d28d9">Pro-Code →</text>

  <!-- Tool boxes -->
  <rect x="30" y="62" width="150" height="70" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Copilot Studio</text>
  <text x="105" y="98" text-anchor="middle" font-size="9" fill="#22c55e">GUI only</text>
  <text x="105" y="114" text-anchor="middle" font-size="9" fill="#64748b">Drag-and-drop</text>
  <text x="105" y="126" text-anchor="middle" font-size="9" fill="#64748b">No code required</text>

  <rect x="195" y="62" width="150" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="270" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Copilot Studio +</text>
  <text x="270" y="98" text-anchor="middle" font-size="9" fill="#3b82f6">Custom Connectors</text>
  <text x="270" y="114" text-anchor="middle" font-size="9" fill="#64748b">Some configuration</text>
  <text x="270" y="126" text-anchor="middle" font-size="9" fill="#64748b">Low-code + plugins</text>

  <rect x="360" y="62" width="150" height="70" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="435" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#a16207">Foundry Agent Svc</text>
  <text x="435" y="98" text-anchor="middle" font-size="9" fill="#ca8a04">SDK + portal</text>
  <text x="435" y="114" text-anchor="middle" font-size="9" fill="#64748b">Managed infra</text>
  <text x="435" y="126" text-anchor="middle" font-size="9" fill="#64748b">Python / C# SDK</text>

  <rect x="525" y="62" width="145" height="70" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="598" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">Agent Framework</text>
  <text x="598" y="98" text-anchor="middle" font-size="9" fill="#8b5cf6">Full code control</text>
  <text x="598" y="114" text-anchor="middle" font-size="9" fill="#64748b">SK / AutoGen</text>
  <text x="598" y="126" text-anchor="middle" font-size="9" fill="#64748b">LangChain / custom</text>

  <!-- Bottom note -->
  <text x="350" y="165" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">More control = more flexibility + more responsibility</text>
  <text x="350" y="182" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">Choose based on your use case, team skills, and governance needs</text>
</svg>
