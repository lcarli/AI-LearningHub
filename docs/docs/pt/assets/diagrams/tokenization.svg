<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="700" height="200" fill="#f8f9fa" rx="12"/>
  <text x="350" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">How Tokenization Works</text>

  <!-- Example 1 -->
  <text x="30" y="58" font-size="11" fill="#64748b">Input:</text>
  <text x="80" y="58" font-size="12" font-weight="600" fill="#1e293b">"The quick brown fox"</text>
  <text x="30" y="88" font-size="11" fill="#64748b">Tokens:</text>
  <rect x="80" y="72" width="55" height="24" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="108" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">The</text>
  <rect x="142" y="72" width="70" height="24" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1" filter="url(#shadow)"/>
  <text x="177" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a"> quick</text>
  <rect x="219" y="72" width="72" height="24" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="1" filter="url(#shadow)"/>
  <text x="255" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#a16207"> brown</text>
  <rect x="298" y="72" width="55" height="24" rx="5" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1" filter="url(#shadow)"/>
  <text x="326" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9"> fox</text>
  <text x="370" y="88" font-size="10" fill="#94a3b8">= 4 tokens</text>

  <!-- Example 2 -->
  <text x="30" y="125" font-size="11" fill="#64748b">Input:</text>
  <text x="80" y="125" font-size="12" font-weight="600" fill="#1e293b">"Hello, world!"</text>
  <text x="30" y="155" font-size="11" fill="#64748b">Tokens:</text>
  <rect x="80" y="139" width="60" height="24" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Hello</text>
  <rect x="147" y="139" width="25" height="24" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">,</text>
  <rect x="179" y="139" width="62" height="24" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1" filter="url(#shadow)"/>
  <text x="210" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a"> world</text>
  <rect x="248" y="139" width="25" height="24" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1" filter="url(#shadow)"/>
  <text x="261" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">!</text>
  <text x="290" y="155" font-size="10" fill="#94a3b8">= 4 tokens</text>

  <!-- Key insight -->
  <rect x="440" y="65" width="240" height="100" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="560" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">💡 Key Facts</text>
  <text x="560" y="108" text-anchor="middle" font-size="10" fill="#64748b">1 token ≈ 4 characters</text>
  <text x="560" y="124" text-anchor="middle" font-size="10" fill="#64748b">1 token ≈ ¾ of a word</text>
  <text x="560" y="140" text-anchor="middle" font-size="10" fill="#64748b">Punctuation = separate tokens</text>
  <text x="560" y="156" text-anchor="middle" font-size="10" fill="#64748b">"OpenAI" → ["Open", "AI"]</text>
</svg>
