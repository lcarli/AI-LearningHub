<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#4527A0"/>

  <!-- Center node (brain/agent core) -->
  <circle cx="32" cy="32" r="7" fill="#E040FB" opacity="0.95"/>

  <!-- Outer ring dots (agents/tools connected) -->
  <circle cx="32" cy="10" r="4" fill="#00E5FF"/>
  <circle cx="32" cy="54" r="4" fill="#00E5FF"/>
  <circle cx="10" cy="32" r="4" fill="#00E5FF"/>
  <circle cx="54" cy="32" r="4" fill="#00E5FF"/>
  <circle cx="15" cy="15" r="3.5" fill="#7C4DFF"/>
  <circle cx="49" cy="15" r="3.5" fill="#7C4DFF"/>
  <circle cx="15" cy="49" r="3.5" fill="#7C4DFF"/>
  <circle cx="49" cy="49" r="3.5" fill="#7C4DFF"/>

  <!-- Connection lines (cardinal) -->
  <line x1="32" y1="25" x2="32" y2="14" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="32" y1="39" x2="32" y2="50" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="25" y1="32" x2="14" y2="32" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="39" y1="32" x2="50" y2="32" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Connection lines (diagonal) -->
  <line x1="27" y1="27" x2="18" y2="18" stroke="#7C4DFF" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="37" y1="27" x2="46" y2="18" stroke="#7C4DFF" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="27" y1="37" x2="18" y2="46" stroke="#7C4DFF" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="37" y1="37" x2="46" y2="46" stroke="#7C4DFF" stroke-width="1.2" stroke-opacity="0.6"/>

  <!-- "AI" text in center -->
  <text x="32" y="36" text-anchor="middle" font-family="'Roboto', Arial, sans-serif" font-weight="700" font-size="8" fill="white" letter-spacing="0.5">AI</text>
</svg>
