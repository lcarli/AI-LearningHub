<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="900" height="320" fill="#f8f9fa" rx="12"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Fabric IQ — Real-Time Intelligence Pipeline</text>

  <rect x="20" y="60" width="130" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="85" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">📡 IoT Sensors</text>
  <text x="85" y="106" text-anchor="middle" font-size="9" fill="#3b82f6">Temp · Humidity</text>
  <text x="85" y="120" text-anchor="middle" font-size="9" fill="#3b82f6">Stock · Door opens</text>

  <line x1="150" y1="95" x2="178" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="183" y="60" width="130" height="70" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="248" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">🌊 Eventstream</text>
  <text x="248" y="106" text-anchor="middle" font-size="9" fill="#22c55e">Fabric ingestion</text>
  <text x="248" y="120" text-anchor="middle" font-size="9" fill="#22c55e">Real-time pipeline</text>

  <line x1="313" y1="95" x2="341" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="346" y="60" width="130" height="70" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="411" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">🏠 Eventhouse</text>
  <text x="411" y="106" text-anchor="middle" font-size="9" fill="#8b5cf6">KQL time-series DB</text>
  <text x="411" y="120" text-anchor="middle" font-size="9" fill="#8b5cf6">Anomaly detection</text>

  <line x1="476" y1="80" x2="504" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="476" y1="110" x2="504" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="509" y="50" width="130" height="40" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="574" y="75" text-anchor="middle" font-size="11" font-weight="600" fill="#be185d">⚡ Activator</text>

  <rect x="509" y="100" width="130" height="40" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="574" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#a16207">📊 Dashboard</text>

  <line x1="639" y1="70" x2="667" y2="70" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="672" y="50" width="200" height="90" rx="10" fill="#ffedd5" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="772" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">🤖 AI Agent</text>
  <text x="772" y="96" text-anchor="middle" font-size="9" fill="#ea580c">Reads Eventhouse via MCP</text>
  <text x="772" y="112" text-anchor="middle" font-size="9" fill="#ea580c">Answers NL questions</text>
  <text x="772" y="128" text-anchor="middle" font-size="9" fill="#ea580c">about live data streams</text>

  <!-- Alert types row -->
  <text x="450" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Alert Thresholds You'll Configure</text>
  <rect x="40" y="192" width="195" height="45" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="138" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">🌡️ Temperature > 30°C</text>
  <text x="138" y="228" text-anchor="middle" font-size="9" fill="#ef4444">Cold chain violation</text>
  <rect x="255" y="192" width="195" height="45" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="353" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">📦 Stock < 10 units</text>
  <text x="353" y="228" text-anchor="middle" font-size="9" fill="#f59e0b">Critical inventory</text>
  <rect x="470" y="192" width="195" height="45" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="568" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">💧 Humidity > 80%</text>
  <text x="568" y="228" text-anchor="middle" font-size="9" fill="#3b82f6">Equipment damage risk</text>
  <rect x="685" y="192" width="195" height="45" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="783" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">🚪 Door opens > 20/hr</text>
  <text x="783" y="228" text-anchor="middle" font-size="9" fill="#64748b">Security/efficiency concern</text>

  <text x="450" y="275" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">OutdoorGear Inc. — 5 warehouses · 50 sensor events · 1-hour snapshot</text>
</svg>
