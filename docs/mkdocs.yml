plugins:
  - search
  - glightbox
  - tags:
      tags_file: tags.md
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          site_name: AI Agents Learning Hub
          admonition_translations:
            tip: Tip
            warning: Warning
            info: Info
            note: Note
            danger: Danger
            success: Success
            question: Question

theme:
  name: material
  favicon: media/logo.svg
  logo: media/logo.svg
  features:
    - navigation.footer
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest

  font:
    code: Roboto Mono
    text: Roboto

  palette:
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-2
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: docs/en

extra_css:
  - css/custom.css

extra_javascript:
  - js/hub-features.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YOUR_ORG/ai-agents-learning-hub

exclude_docs: |
  **/includes/**/_*
